version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: always

  mlflow-ui:
    image: python:3.11-slim
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /app/models/mlruns"
    restart: always
